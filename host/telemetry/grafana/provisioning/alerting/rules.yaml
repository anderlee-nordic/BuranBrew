                          WHERE metric = 'internal'
                          ORDER BY ts DESC
                          LIMIT 1
                        )),
                        1000000000
                      )::double precision AS age_s;
                refId: A
            - refId: B
              relativeTimeRange:
                from: 3600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 180
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: classic_conditions
          dashboardUid: buranbrew-main
          panelId: 6
          noDataState: Alerting
          execErrState: Alerting
          for: 2m
          annotations:
            description: No internal/Tilt temperature sample has reached TimescaleDB for more than 3 minutes. Check Tilt BLE updates, model/run.py, Redis, the consumer, and Postgres.
            summary: Internal temperature telemetry is stale
