apiVersion: 1

providers:
  - name: buranbrew
    type: file
    disableDeletion: true
    allowUiUpdates: false
    updateIntervalSeconds: 30
    options:
      # substituted by scripts/grafana-run.sh with the nix-store path of
      # telemetry/grafana/dashboards (provisioning yaml can't be relative)
      path: "@DASH_PATH@"
      foldersFromFilesStructure: false
