                editorMode: code
                format: time_series
                intervalMs: 1000
                maxDataPoints: 43200
                rawQuery: true
                rawSql: |
                    SELECT
                      now() AS "time",
                      coalesce(
                        extract(epoch FROM now() - (
                          SELECT ts
                          FROM sensor_data
                          WHERE metric = 'ambient'
                          ORDER BY ts DESC
                          LIMIT 1
                        )),
                        1000000000
                      )::double precision AS age_s;
                refId: A
            - refId: B
              relativeTimeRange:
                from: 3600
                to: 0
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 180
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - A
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: B
                type: classic_conditions
          dashboardUid: buranbrew-main
          panelId: 6
          noDataState: Alerting
          execErrState: Alerting
          for: 2m
          annotations:
            description: No ambient sensor sample has reached TimescaleDB for more than 3 minutes. Check model/run.py, Matter reads, Redis, the consumer, and Postgres.
            summary: Ambient temperature telemetry is stale
          labels:
            app: buranbrew
            component: telemetry
            kind: freshness
            metric: ambient
            severity: warning
          isPaused: false
